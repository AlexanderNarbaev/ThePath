<aside class="sidebar" id="sidebar">
  <button class="sidebar-toggle" onclick="document.getElementById('sidebar').classList.toggle('open')">
    {{ site.data.ui.sidebar_modules[page.lang] }}
  </button>
  <nav class="sidebar-nav">
    <h3>{{ site.data.ui.sidebar_title[page.lang] }}</h3>
    <ul>
      {% assign current_num = page.module_number | default: -1 %}
      {% for m in site.data.modules %}
      <li {% if current_num == m.number %}class="active"{% endif %}>
        <a href="{{ site.baseurl }}/{{ page.lang }}/module-{{ m.number }}.html">
          <span class="mod-num">{{ m.number }}</span>
          <span class="mod-title">
            {% if page.lang == "en" %}{{ m.title_en }}{% else %}{{ m.title }}{% endif %}
          </span>
        </a>
      </li>
      {% endfor %}
    </ul>
  </nav>
</aside>
