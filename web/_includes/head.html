<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% if page.title %}{{ page.title }} — {{ site.title }}{% else %}{{ site.title }} — {{ site.description }}{% endif %}</title>
<meta name="description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
<link rel="icon" type="image/x-icon" href="{{ site.baseurl }}/assets/images/favicon.ico">
<link rel="apple-touch-icon" href="{{ site.baseurl }}/assets/images/apple-touch-icon.png">
<meta property="og:title" content="{{ site.title }}">
<meta property="og:description" content="{{ site.description }}">
<meta property="og:image" content="{{ site.baseurl }}/assets/images/og-image.png">
<meta property="og:type" content="website">
<link rel="stylesheet" href="{{ site.baseurl }}/assets/css/style.css">
{% if page.lang == "ru" %}
<link rel="alternate" hreflang="en" href="{{ page.url | replace: '/ru/', '/en/' }}">
{% else %}
<link rel="alternate" hreflang="ru" href="{{ page.url | replace: '/en/', '/ru/' }}">
{% endif %}
