name: Deploy to GitVerse Pages
on:
  push:
    branches: [main]
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22 }
      - run: npm ci
        working-directory: web
      - run: npm run build
        working-directory: web
      - uses: peaceiris/actions-gh-pages@v4
        with:
          publish_dir: web/dist
